---
- name: Install lighttpd web server
  become: yes
  apt:
    name: lighttpd
    state: latest
    update_cache: yes

- name: Generate configuration file
  template:
    src: myconfig.j2
    dest: /etc/lighttpd/lighttpd.conf
    owner: raim2007
    group: raim2007 
    mode: '0644'
  vars:
    server_port: 9090

- name: Start lighttpd service
  become: yes
  service:
    name: lighttpd
    state: started
